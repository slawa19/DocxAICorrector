# ---------------------------------------------------------------------------
# Output document fonts
#
# Controls the theme fonts injected into the Pandoc reference document used
# when converting AI-generated Markdown to DOCX.
#
# Word resolves font names for styled paragraphs via the document's embedded
# theme:  w:asciiTheme="majorHAnsi" → heading font,
#         w:asciiTheme="minorHAnsi" → body / list / caption font.
#
# When this section is absent (or both keys are commented out) the python-docx
# built-in template theme is used as-is:
#   body    → Cambria   (minorHAnsi default)
#   heading → Calibri   (majorHAnsi default)
#
# Uncomment and set to override for all output documents:
#
# [output.fonts]
# body    = "Aptos"          # Normal, List Paragraph, Caption, Table
# heading = "Aptos Display"  # Heading 1–6
# ---------------------------------------------------------------------------

chunk_size = 6000
max_retries = 3
processing_operation_default = "edit"
source_language_default = "en"
target_language_default = "ru"
editorial_intensity_default = "literary"
supported_languages = [
  { code = "ru", label = "Русский" },
  { code = "en", label = "English" },
  { code = "de", label = "Deutsch" },
  { code = "fr", label = "Français" },
  { code = "es", label = "Español" },
  { code = "it", label = "Italiano" },
  { code = "pl", label = "Polski" },
  { code = "zh", label = "中文" },
  { code = "ja", label = "日本語" },
]
enable_paragraph_markers = true
image_mode_default = "no_change"
semantic_validation_policy = "advisory"
keep_all_image_variants = false
min_semantic_match_score = 0.75
min_text_match_score = 0.80
min_structure_match_score = 0.70
validator_confidence_threshold = 0.75
allow_accept_with_partial_text_loss = false
prefer_deterministic_reconstruction = true
enable_vision_image_analysis = true
enable_vision_image_validation = true
semantic_redraw_max_attempts = 2
semantic_redraw_max_model_calls_per_image = 9
dense_text_bypass_threshold = 18
non_latin_text_bypass_threshold = 12
reconstruction_min_canvas_short_side_px = 900
reconstruction_target_min_font_px = 18
reconstruction_max_upscale_factor = 3.0
reconstruction_background_sample_ratio = 0.04
reconstruction_background_color_distance_threshold = 48.0
reconstruction_background_uniformity_threshold = 10.0

[models.text]
default = "gpt-5.4-mini"
options = [
  "gpt-5.4",
  "gpt-5.4-mini",
  "gpt-5-mini",
]

[models.structure_recognition]
default = "gpt-5-mini"

[models.image_analysis]
default = "gpt-5.4-mini"

[models.image_validation]
default = "gpt-5.4-mini"

[models.image_reconstruction]
default = "gpt-5.4-mini"

[models.image_generation]
default = "gpt-image-1.5"

[models.image_edit]
default = "gpt-image-1.5"

[models.image_generation_vision]
default = "gpt-5.4-mini"

[paragraph_boundary_normalization]
enabled = true
mode = "high_only"
save_debug_artifacts = true

[relation_normalization]
enabled = true
profile = "phase2_default"
enabled_relation_kinds = ["image_caption", "table_caption", "epigraph_attribution", "toc_region"]
save_debug_artifacts = true

[paragraph_boundary_ai_review]
enabled = false
mode = "off"
candidate_limit = 200
timeout_seconds = 30
max_tokens_per_candidate = 120

[structure_recognition]
enabled = false
# DEPRECATED: use [models.structure_recognition].default instead.
# model = "gpt-5-mini"
max_window_paragraphs = 1800
overlap_paragraphs = 50
timeout_seconds = 60
min_confidence = "medium"
cache_enabled = true
save_debug_artifacts = true

[image_output]
generate_candidate_sizes = ["1536x1024", "1024x1536", "1024x1024"]
edit_candidate_sizes = ["1536x1024", "1024x1536", "1024x1024", "512x512", "256x256"]
generate_size_square = "1024x1024"
generate_size_landscape = "1536x1024"
generate_size_portrait = "1024x1536"
aspect_ratio_threshold = 1.2
trim_tolerance = 20
trim_padding_ratio = 0.02
trim_padding_min_px = 4
trim_max_loss_ratio = 0.15
