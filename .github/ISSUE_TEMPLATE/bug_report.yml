name: Bug report
description: Report a reproducible defect in DocxAICorrector
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A short and precise description of the problem.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal sequence of actions.
      placeholder: |
        1. Open the app
        2. Upload a DOCX file
        3. Start processing
        4. Observe the failure
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Include `log: ...` identifiers from the UI when available.
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Windows 11, Python 3.12, local Streamlit run