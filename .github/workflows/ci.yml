name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  editable-install:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify editable install
        run: |
          python -m pip install --upgrade pip
          python -m venv .venv
          . .venv/bin/activate
          pip install -e ".[dev]"
          python -c "import docxaicorrector"

      - name: Run pyright fail-hard
        run: |
          . .venv/bin/activate
          timeout 180s python -m pyright src/docxaicorrector tests

      - name: Run local pyright regression wrapper
        run: |
          . .venv/bin/activate
          bash scripts/test.sh tests/test_typecheck.py -q

      - name: Clean working tree before tests
        run: git clean -fdx

  tests:
    runs-on: ubuntu-latest
    needs: [editable-install]
    env:
      DOCXAI_SKIP_WORKFLOW_SMOKE: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt

      - name: Clean working tree before tests
        run: git clean -fdx

      - name: Run static workflow checks
        run: bash scripts/test.sh tests/test_script_contract_static.py -q

      - name: Run full test suite
        run: bash scripts/test.sh tests/ -q
