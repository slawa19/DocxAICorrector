name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  editable-install:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify editable install
        run: |
          python -m pip install --upgrade pip
          python -m venv .venv
          . .venv/bin/activate
          pip install -e ".[dev]"
          python -c "import docxaicorrector"
          bash scripts/test.sh tests/test_typecheck.py -q

      - name: Clean working tree before tests
        run: git clean -fdx

  tests:
    runs-on: ubuntu-latest
    needs: [editable-install]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt

      - name: Clean working tree before tests
        run: git clean -fdx

      - name: Run full test suite
        run: bash scripts/test.sh tests/ -q
