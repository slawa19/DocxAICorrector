name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  editable-install:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean working tree before tests
        run: git clean -fdx

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify editable install
        run: |
          python -m pip install --upgrade pip
          python -m venv .venv
          . .venv/bin/activate
          pip install -e ".[dev]"
          python -c "import docxaicorrector"

      - name: Run pyright fail-hard
        run: |
          . .venv/bin/activate
          timeout 180s python -m pyright src/docxaicorrector tests

      - name: Run local pyright regression wrapper
        run: |
          . .venv/bin/activate
          bash scripts/test.sh tests/test_typecheck.py -q

  tests:
    runs-on: ubuntu-latest
    # Deliberately NOT gated on `editable-install`: its pyright fail-hard step has been
    # red since 2026-05-12 on pre-existing type debt, which silently skipped the whole
    # suite. The two signals are independent — a type regression must not hide a test one.
    env:
      DOCXAI_SKIP_WORKFLOW_SMOKE: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean working tree before tests
        run: git clean -fdx

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt

      - name: Run static workflow checks
        run: bash scripts/test.sh tests/test_script_contract_static.py -q

      - name: Run full test suite
        run: bash scripts/test.sh tests/ -q -m "not static_workflow and not typecheck and not system_deps and not manual_ai_heavy and not browser_ui"
