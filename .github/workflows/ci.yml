name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  workflow-contract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt

      - name: Verify test workflow contract
        run: bash scripts/test.sh tests/test_script_workflow_smoke.py -q

  startup-contract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt

      - name: Verify startup performance contract
        run: bash scripts/test.sh tests/test_startup_performance_contract.py -q

  tests:
    runs-on: ubuntu-latest
    needs: [workflow-contract, startup-contract]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt

      - name: Run full test suite
        run: bash scripts/test.sh tests/ -q