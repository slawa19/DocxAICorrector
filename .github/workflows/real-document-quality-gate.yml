name: Real Document Quality Gate

on:
  workflow_dispatch:

jobs:
  real-document-quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DOCXAI_RUN_REAL_DOCUMENT_QUALITY: "1"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          grep -vE '^\s*(#|$)' system-requirements.apt | xargs -r sudo apt-get install -y

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt

      - name: Run real-document quality gate
        run: |
          bash scripts/run-real-document-quality-gate.sh

      - name: Upload quality-gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-document-quality-gate-artifacts
          if-no-files-found: ignore
          path: |
            .run/**
            tests/artifacts/real_document_pipeline/**
            tests/artifacts/structural_diagnostics/**