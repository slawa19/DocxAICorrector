name: Real Document AI Structure Smoke

on:
  workflow_dispatch:

jobs:
  manual-ai-structure-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DOCXAI_RUN_REAL_DOCUMENT_STRUCTURE_RECOGNITION: "1"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Require OpenAI secret
        run: |
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "OPENAI_API_KEY secret is required for Real Document AI Structure Smoke"
            exit 1
          fi

      - name: Install system dependencies
        run: |
          sudo apt-get update
          grep -vE '^\s*(#|$)' system-requirements.apt | xargs -r sudo apt-get install -y

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt

      - name: Run real AI structure-recognition smoke
        run: |
          bash scripts/test.sh tests/test_real_document_structure_recognition_integration.py -vv

      - name: Upload AI structure smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-document-ai-structure-smoke-artifacts
          if-no-files-found: ignore
          path: |
            .run/**
            tests/artifacts/real_document_pipeline/**
