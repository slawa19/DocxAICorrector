[server]
maxUploadSize = 25
headless = true
enableCORS = false
enableXsrfProtection = false
address = "0.0.0.0"
folderWatchBlacklist = [".run", ".git", ".venv", "__pycache__", ".pytest_cache"]

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"

[theme]
primaryColor = "#19c6b7"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#1a2332"
textColor = "#e2e8f0"
