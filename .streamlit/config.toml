[server]
maxUploadSize = 25
headless = true
# Safe-by-default: XSRF protection on. Streamlit requires enableCORS=true when
# enableXsrfProtection=true (it force-overrides CORS otherwise), so both are on.
enableCORS = true
enableXsrfProtection = true
# Loopback by default. Remote exposure is an explicit opt-in via DOCX_AI_BIND_HOST
# (see scripts/_shared.ps1) and MUST sit behind an authenticating reverse proxy —
# the app has no built-in authentication.
address = "127.0.0.1"
fileWatcherType = "none"
runOnSave = false
folderWatchBlacklist = [".run", ".git", ".venv", "__pycache__", ".pytest_cache"]

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"

[theme]
primaryColor = "#19c6b7"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#1a2332"
textColor = "#e2e8f0"
